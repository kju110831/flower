<body class="text-gray-800 h-screen w-screen overflow-hidden bg-[#FFF5F5] p-0 m-0 flex justify-center items-center">

  <div id="app-container" class="w-full h-full relative overflow-hidden flex flex-col p-0 m-0">

    <!-- 2. 손님용 화면 (키오스크 - 가로/세로 자동회전 완벽 대응) -->
    <div id="view-customer" class="hidden absolute inset-0 flex flex-col bg-pink-50 z-40">
      <!-- 상단 헤더 -->
      <div class="bg-pink-400 text-white text-3xl sm:text-4xl md:text-5xl font-bold py-4 sm:py-6 px-6 sm:px-8 text-center shadow-md flex justify-between items-center shrink-0">

      <!-- 꽃 리스트 (가로/세로에 맞춤형 반응 그리드 적용) -->

      <div id="flower-grid" class="flex-1 p-4 sm:p-6 grid grid-cols-1 grid-rows-4 landscape:grid-cols-2 landscape:grid-rows-2 gap-4 sm:gap-6 h-full min-h-0">

      </div>

      <!-- 하단 주문하기 고정 영역 -->
      <div class="bg-white py-4 sm:py-6 px-6 sm:px-12 shadow-[0_-6px_20px_rgba(0,0,0,0.15)] shrink-0 flex justify-between items-center rounded-t-[2rem] sm:rounded-t-[2.5rem] border-t-4 sm:border-t-8 border-pink-200">
        <div class="text-2xl sm:text-4xl md:text-5xl text-pink-600 font-bold">

        </div>
        <button id="btn-order" onclick="submitOrder()" class="btn-press bg-pink-500 text-white text-2xl sm:text-4xl md:text-5xl font-bold py-4 sm:py-6 px-8 sm:px-16 rounded-2xl sm:rounded-3xl shadow-xl border-b-4 sm:border-b-8 border-pink-700 opacity-50 cursor-not-allowed transition-all flex items-center gap-3 sm:gap-4">
          <span>주문하기</span> <span>🛒</span>
        </button>
      </div>

    <!-- 3. 사장님용 화면 (독립 레이아웃 격리) -->
    <div id="view-owner" class="hidden absolute inset-0 flex flex-col bg-blue-50 z-30">
      <!-- 상단 헤더 -->
      <div class="bg-blue-400 text-white text-3xl sm:text-4xl md:text-5xl font-bold py-4 sm:py-6 px-6 sm:px-8 text-center shadow-md flex justify-between items-center shrink-0">
        <button onclick="goHome()" class="text-xl sm:text-2xl md:text-3xl bg-blue-500 py-2 sm:py-3 px-4 sm:px-6 rounded-2xl btn-press">🏠 처음으로</button>
        <span class="tracking-wide">🏪 꽃가게 사장님 화면 🏪</span>
        <div class="text-2xl sm:text-3xl bg-blue-500 py-2 sm:py-3 px-4 sm:px-6 rounded-2xl">대기 주문: <span id="order-count-badge" class="font-bold">0</span></div>
      </div>

      <!-- 주문 내역 리스트 -->
      <div id="order-list" class="flex-1 overflow-y-auto p-4 sm:p-8 flex flex-col gap-4 sm:gap-6">
        <div id="empty-orders" class="h-full flex flex-col items-center justify-center text-gray-400 text-3xl sm:text-4xl gap-4 sm:gap-6 my-auto">
          <span class="text-8xl sm:text-9xl">💤</span>
          <span class="font-bold text-gray-500">아직 들어온 주문이 없어요!</span>
          <span class="text-xl sm:text-2xl text-gray-400">손님들이 꽃을 고르고 있어요.</span>
        </div>
      </div>
    </div>

    <!-- 화면 중앙 주문 완료 안내 (클릭 관여 없는 귀여운 토스트) -->
    <div id="toast-message" class="hidden absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-green-500 text-white px-10 sm:px-16 py-6 sm:py-8 rounded-[2rem] text-3xl sm:text-4xl md:text-5xl shadow-2xl z-[100] font-bold pointer-events-none transition-all duration-300 flex flex-col items-center gap-3 sm:gap-4">
      <span class="text-6xl sm:text-7xl">🎉</span>
      <span class="text-center">주문이 사장님께 날아갔어요!</span>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCXqCCi3tWHmL6OKC4SIkqYsJA1-0Sal4w",
      authDomain: "flower-d52f7.firebaseapp.com",
      projectId: "flower-d52f7",
      storageBucket: "flower-d52f7.firebasestorage.app",
      messagingSenderId: "894573402179",
      appId: "1:894573402179:web:645cb0aef8b4d977ffdcf6",
      measurementId: "G-F4X9T42XMP"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const ORDERS_COLLECTION = "kindergarten_flower_orders";

    const flowers = [
      { id: 'sunflower', name: '해바라기', icon: '🌻', color: 'bg-yellow-100', border: 'border-yellow-400' },
      { id: 'rose', name: '장미', icon: '🌹', color: 'bg-red-100', border: 'border-red-400' },
      { id: 'tulip', name: '튤립', icon: '🌷', color: 'bg-pink-100', border: 'border-pink-400' },
      { id: 'daisy', name: '데이지', icon: '🌼', color: 'bg-green-100', border: 'border-green-400' }
    ];

    let cart = { sunflower: 0, rose: 0, tulip: 0, daisy: 0 };
    let currentRole = null;
    let unsubscribeOrders = null;
    let previousOrderCount = 0;

    // --- 웹 오디오 설정 ---
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    // 터치 입력 즉시 음소거 정책 해제 처리
    window.addEventListener('touchstart', initAudio, { passive: true });
    window.addEventListener('click', initAudio, { passive: true });
    window.addEventListener('pointerdown', initAudio, { passive: true });

    function playSound(type) {
      initAudio();
      if (!audioCtx) return;

      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      
      const now = audioCtx.currentTime;

      if (type === 'success') {
        osc.type = 'sine';
        const notes = [523.25, 659.25, 783.99, 1046.50];
        notes.forEach((freq, index) => {
          osc.frequency.setValueAtTime(freq, now + index * 0.08);
        });
        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(0.6, now + 0.05);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
        osc.start(now);
        osc.stop(now + 0.6);
      } else if (type === 'notification') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(880.00, now);
        osc.frequency.setValueAtTime(698.46, now + 0.12);
        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(0.7, now + 0.05);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
        osc.start(now);
        osc.stop(now + 0.8);
      } else if (type === 'pop') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(450, now);
        osc.frequency.exponentialRampToValueAtTime(1000, now + 0.06);
        gainNode.gain.setValueAtTime(0.6, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.06);
        osc.start(now);
        osc.stop(now + 0.06);
      }
    }

    // --- 앱 상태 제어 ---
    window.startApp = async (role) => {
      initAudio();
      playSound('pop');
      currentRole = role;
      document.getElementById('view-menu').classList.add('hidden');
      
      try {
        await signInAnonymously(auth);
      } catch (error) {
        console.warn("Firebase 로그인 우회:", error);
      }

      if (role === 'customer') {
        document.getElementById('view-customer').classList.remove('hidden');
        document.getElementById('view-owner').classList.add('hidden'); // 격리 처리 추가
        renderCustomerView();
      } else if (role === 'owner') {
        document.getElementById('view-owner').classList.remove('hidden');
        document.getElementById('view-customer').classList.add('hidden'); // 격리 처리 추가
        startListeningToOrders();
      }
    };

    window.goHome = () => {
      playSound('pop');
      document.getElementById('view-customer').classList.add('hidden');
      document.getElementById('view-owner').classList.add('hidden');
      document.getElementById('view-menu').classList.remove('hidden');
      if (unsubscribeOrders) {
        unsubscribeOrders();
        unsubscribeOrders = null;
      }
      resetCart();
      currentRole = null;
    };

    // --- 손님용 (키오스크) UI 조립 ---
    function renderCustomerView() {
      const grid = document.getElementById('flower-grid');
      grid.innerHTML = '';
      flowers.forEach(flower => {
        const card = document.createElement('div');
        // 가로/세로 회전에 최적화된 패딩 및 높이 유동 조정 클래스 적용
        card.className = `${flower.color} border-4 ${flower.border} rounded-[2rem] p-3 sm:p-5 flex flex-row landscape:flex-col justify-between items-center shadow-lg h-full w-full min-h-0`;
        card.innerHTML = `
          <!-- 이미지 아이콘이 가로/세로 모드에서도 적절한 크기를 갖도록 조정 -->
          <div class="text-6xl sm:text-7xl md:text-[6.5rem] leading-none select-none flex-shrink-0">${flower.icon}</div>
          <div class="text-2xl sm:text-3xl md:text-4xl font-black text-gray-800">${flower.name}</div>
          <div class="flex items-center gap-3 sm:gap-6 bg-white rounded-2xl p-2 sm:p-3 shadow-inner w-auto sm:w-full max-w-xs justify-between flex-shrink-0">
            <button onclick="updateCart('${flower.id}', -1)" class="btn-press bg-gray-200 text-gray-700 w-12 h-12 sm:w-16 sm:h-16 rounded-xl sm:rounded-2xl text-2xl sm:text-4xl font-extrabold flex items-center justify-center">-</button>
            <span id="count-${flower.id}" class="text-2xl sm:text-4xl md:text-5xl font-extrabold w-12 sm:w-16 text-center text-gray-800">${cart[flower.id]}</span>
            <button onclick="updateCart('${flower.id}', 1)" class="btn-press bg-pink-400 text-white w-12 h-12 sm:w-16 sm:h-16 rounded-xl sm:rounded-2xl text-2xl sm:text-4xl font-extrabold flex items-center justify-center">+</button>
          </div>
        `;
        grid.appendChild(card);
      });
      updateOrderButton();
    }

    // 회전 발생 시 가로/세로 레이아웃을 다시 그리기 위해 렌더링 동기화
    window.addEventListener('resize', () => {
      if (currentRole === 'customer') {
        renderCustomerView();
      }
    });

    window.updateCart = (flowerId, change) => {
      playSound('pop');
      const newCount = cart[flowerId] + change;
      if (newCount >= 0 && newCount <= 20) {
        cart[flowerId] = newCount;
        document.getElementById(`count-${flowerId}`).innerText = cart[flowerId];
        updateOrderButton();
      }
    };

    function updateOrderButton() {
      const totalCount = Object.values(cart).reduce((a, b) => a + b, 0);
      document.getElementById('total-count').innerText = totalCount;
      
      const btn = document.getElementById('btn-order');
      if (totalCount > 0) {
        btn.classList.remove('opacity-50', 'cursor-not-allowed', 'bg-gray-400', 'border-gray-600');
        btn.classList.add('bg-pink-500', 'border-pink-700');
        btn.disabled = false;
      } else {
        btn.classList.add('opacity-50', 'cursor-not-allowed', 'bg-gray-400', 'border-gray-600');
        btn.classList.remove('bg-pink-500', 'border-pink-700');
        btn.disabled = true;
      }
    }

    function resetCart() {
      for (let key in cart) {
        cart[key] = 0;
      }
      renderCustomerView();
    }

    window.submitOrder = async () => {
      const totalCount = Object.values(cart).reduce((a, b) => a + b, 0);
      if (totalCount === 0) return;

      const orderItems = [];
      flowers.forEach(f => {
        if (cart[f.id] > 0) {
          orderItems.push({ name: f.name, icon: f.icon, count: cart[f.id] });
        }
      });

      // 누름과 동시에 지체없이 바로 0으로 숫자 동기화 리셋
      resetCart();
      updateOrderButton();

      // 알림음 및 귀여운 안내 토스트 팝업 실행
      playSound('success');
      const toast = document.getElementById('toast-message');
      toast.classList.remove('hidden');
      setTimeout(() => {
        toast.classList.add('hidden');
      }, 1800);

      try {
        await addDoc(collection(db, ORDERS_COLLECTION), {
          items: orderItems,
          total: totalCount,
          createdAt: serverTimestamp()
        });
      } catch (error) {
        console.error("주문 전송 오류:", error);
      }
    };

    // --- 사장님용 실시간 감시 모드 ---
    function startListeningToOrders() {
      const q = collection(db, ORDERS_COLLECTION);
      
      unsubscribeOrders = onSnapshot(q, (snapshot) => {
        const orders = [];
        snapshot.forEach((doc) => {
          orders.push({ id: doc.id, ...doc.data() });
        });

        orders.sort((a, b) => {
          const timeA = a.createdAt ? a.createdAt.toMillis() : Date.now();
          const timeB = b.createdAt ? b.createdAt.toMillis() : Date.now();
          return timeA - timeB;
        });

        renderOwnerView(orders);

        if (orders.length > previousOrderCount) {
          if (previousOrderCount !== 0) {
            playSound('notification');
            document.body.classList.add('flash-bg');
            setTimeout(() => document.body.classList.remove('flash-bg'), 2400);
          }
        }
        previousOrderCount = orders.length;

      }, (error) => {
        console.error("실시간 수신 오류:", error);
      });
    }

    function renderOwnerView(orders) {
      const listContainer = document.getElementById('order-list');
      const emptyState = document.getElementById('empty-orders');
      document.getElementById('order-count-badge').innerText = orders.length;

      Array.from(listContainer.children).forEach(child => {
        if (child.id !== 'empty-orders') listContainer.removeChild(child);
      });

      if (orders.length === 0) {
        emptyState.classList.remove('hidden');
      } else {
        emptyState.classList.add('hidden');
        
        orders.forEach((order, index) => {
          const card = document.createElement('div');
          card.className = "bg-white p-5 sm:p-6 rounded-[2rem] shadow-lg border-4 border-blue-200 flex flex-col md:flex-row justify-between items-center gap-6 pop-in";
          card.style.animationDelay = `${index * 0.1}s`;
          
          let itemsHtml = order.items.map(item => 
            `<div class="flex items-center gap-3 bg-pink-50 px-5 py-3 rounded-2xl text-2xl sm:text-3xl border border-pink-100">
               <span class="text-3xl sm:text-4xl">${item.icon}</span>
               <span class="font-bold text-gray-700">${item.name} <span class="text-pink-600 font-extrabold text-3xl sm:text-4xl">${item.count}</span>송이</span>
             </div>`
          ).join('');

          card.innerHTML = `
            <div class="flex-1 w-full">
              <div class="text-blue-500 font-bold mb-3 sm:mb-4 flex items-center gap-2">
                <span class="bg-blue-100 px-4 py-2 rounded-xl text-xl sm:text-2xl font-black">주문 번호 ${index + 1}</span>
              </div>
              <div class="flex flex-wrap gap-3 sm:gap-4">
                ${itemsHtml}
              </div>
            </div>
            <button onclick="completeOrder('${order.id}')" class="btn-press shrink-0 bg-blue-500 hover:bg-blue-600 text-white text-2xl sm:text-3xl md:text-4xl font-bold py-6 sm:py-8 px-10 sm:px-12 rounded-[2rem] shadow-xl border-b-8 border-blue-700 w-full md:w-auto transition-all">
              배달 완료 🚚
            </button>
          `;
          listContainer.appendChild(card);
        });
      }
    }

    window.completeOrder = async (orderId) => {
      playSound('pop');
      try {
        await deleteDoc(doc(db, ORDERS_COLLECTION, orderId));
      } catch (error) {
        console.error("배달 처리 오류:", error);
      }
    };

  </script>
</body>
</html>
