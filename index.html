<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🌸 유치원 꽃가게 놀이 🌸</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Jua', sans-serif;
      background-color: #FFF5F5;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      overflow: hidden; 
    }
    .btn-press:active {
      transform: scale(0.95);
    }
    .flash-bg {
      animation: flash 0.8s ease-in-out 3;
    }
    @keyframes flash {
      0%, 100% { background-color: #FFF5F5; }
      50% { background-color: #FEF08A; }
    }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="text-gray-800 h-[100dvh] w-screen overflow-hidden bg-[#FFF5F5] p-0 m-0 flex justify-center items-center">

  <!-- 전체 화면 컨테이너 (h-[100dvh]를 사용하여 주소창과 네비바를 제외한 실제 화면에 100% 밀착시킴) -->
  <div id="app-container" class="w-full h-[100dvh] relative overflow-hidden flex flex-col p-0 m-0">
    
    <!-- 1. 시작 메뉴 화면 -->
    <div id="view-menu" class="absolute inset-0 flex flex-col items-center justify-center bg-[#FFF0F5] z-50 p-6">
      <h1 class="text-5xl sm:text-7xl md:text-8xl text-pink-500 mb-6 text-center drop-shadow-md font-black whitespace-nowrap">🌸 유치원 꽃가게 🌸</h1>
      <p class="text-xl sm:text-2xl md:text-3xl text-pink-400 mb-10 sm:mb-14 font-bold whitespace-nowrap">역할을 골라주세요!</p>
      <div class="flex flex-col sm:flex-row gap-6 sm:gap-10 w-full max-w-4xl justify-center px-6">
        <button onclick="startApp('customer')" class="btn-press flex-1 bg-pink-400 hover:bg-pink-500 text-white text-3xl sm:text-4xl md:text-5xl py-10 sm:py-16 px-8 rounded-[2.5rem] shadow-2xl border-b-8 border-pink-600 flex flex-col items-center justify-center gap-4 sm:gap-6 transition-all">
          <span class="text-7xl sm:text-8xl md:text-9xl">👧👦</span>
          <span class="font-bold tracking-wide whitespace-nowrap">손님용 키오스크</span>
        </button>
        <button onclick="startApp('owner')" class="btn-press flex-1 bg-blue-400 hover:bg-blue-500 text-white text-3xl sm:text-4xl md:text-5xl py-10 sm:py-16 px-8 rounded-[2.5rem] shadow-2xl border-b-8 border-blue-600 flex flex-col items-center justify-center gap-4 sm:gap-6 transition-all">
          <span class="text-7xl sm:text-8xl md:text-9xl">🏪</span>
          <span class="font-bold tracking-wide whitespace-nowrap">사장님용 화면</span>
        </button>
      </div>
    </div>

    <!-- 2. 손님용 화면 -->
    <div id="view-customer" class="hidden absolute inset-0 flex flex-col bg-pink-50 z-40 h-[100dvh]">
      <!-- 상단 헤더 (그리드 정렬로 한 줄 고정 및 찌그러짐 원천 방지) -->
      <div class="bg-pink-400 text-white py-4 px-6 sm:px-8 text-center shadow-md grid grid-cols-3 items-center shrink-0">
        <div class="text-left">
          <button onclick="goHome()" class="text-lg sm:text-2xl md:text-3xl bg-pink-500 py-2.5 px-5 rounded-2xl btn-press whitespace-nowrap">🏠 처음으로</button>
        </div>
        <div class="text-center font-bold text-xl sm:text-3xl md:text-4xl whitespace-nowrap">
          🌸 예쁜 꽃을 골라주세요 🌸
        </div>
        <div class="text-right"></div>
      </div>
      
      <!-- 꽃 상품 리스트 (텍스트와 이미지 크기를 1.5배 키워 시원하게 구성) -->
      <div id="flower-grid" class="flex-1 p-4 sm:p-6 grid grid-cols-1 landscape:grid-cols-3 gap-4 sm:gap-6 h-full min-h-0 overflow-hidden">
        <!-- JS 렌더링 영역 -->
      </div>

      <!-- 하단 주문바 -->
      <div class="bg-white py-3 sm:py-5 px-6 sm:px-12 shadow-[0_-6px_20px_rgba(0,0,0,0.15)] shrink-0 flex justify-between items-center rounded-t-[1.5rem] sm:rounded-t-[2.5rem] border-t-4 sm:border-t-8 border-pink-200 font-bold mb-0 pb-safe">
        <div class="text-xl sm:text-3xl md:text-4xl text-pink-600 whitespace-nowrap">
          내가 고른 수량: <span id="total-count" class="text-2xl sm:text-4xl md:text-5xl text-pink-500 font-extrabold">0</span> 개
        </div>
        <button id="btn-order" onclick="submitOrder()" class="btn-press bg-pink-500 text-white text-xl sm:text-3xl md:text-4xl font-bold py-3 sm:py-5 px-6 sm:px-12 rounded-xl sm:rounded-2xl shadow-xl border-b-4 sm:border-b-8 border-pink-700 opacity-50 cursor-not-allowed transition-all flex items-center gap-3 whitespace-nowrap" disabled>
          <span>주문하기</span> <span>🛒</span>
        </button>
      </div>
    </div>

    <!-- 3. 사장님용 화면 -->
    <div id="view-owner" class="hidden absolute inset-0 flex flex-col bg-blue-50 z-30 h-[100dvh]">
      <!-- 상단 헤더 -->
      <div class="bg-blue-400 text-white py-4 px-6 sm:px-8 text-center shadow-md grid grid-cols-3 items-center shrink-0">
        <div class="text-left">
          <button onclick="goHome()" class="text-lg sm:text-2xl md:text-3xl bg-blue-500 py-2.5 px-5 rounded-2xl btn-press whitespace-nowrap">🏠 처음으로</button>
        </div>
        <div class="text-center font-bold text-xl sm:text-3xl md:text-4xl whitespace-nowrap">
          🏪 꽃가게 사장님 화면 🏪
        </div>
        <div class="text-right font-bold text-lg sm:text-2xl md:text-3xl whitespace-nowrap">
          대기 주문: <span id="order-count-badge" class="bg-blue-500 py-1.5 px-4 rounded-xl">0</span>
        </div>
      </div>

      <!-- 주문 내역 리스트 -->
      <div id="order-list" class="flex-1 overflow-y-auto p-4 sm:p-6 flex flex-col gap-4 sm:gap-5">
        <div id="empty-orders" class="h-full flex flex-col items-center justify-center text-gray-400 text-3xl sm:text-4xl gap-4 sm:gap-6 my-auto font-bold">
          <span class="text-7xl sm:text-8xl">💤</span>
          <span class="text-gray-500 text-2xl sm:text-3xl whitespace-nowrap">아직 들어온 주문이 없어요!</span>
          <span class="text-lg sm:text-xl text-gray-400 whitespace-nowrap">손님들이 주문을 준비하고 있어요.</span>
        </div>
      </div>
    </div>

    <!-- 주문 성공 즉시 알림 토스트 -->
    <div id="toast-message" class="hidden absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-green-500 text-white px-10 sm:px-16 py-6 sm:py-8 rounded-[2rem] text-3xl sm:text-4xl md:text-5xl shadow-2xl z-[100] font-bold pointer-events-none transition-all duration-300 flex flex-col items-center gap-3 sm:gap-4">
      <span class="text-6xl sm:text-7xl">🎉</span>
      <span class="text-center whitespace-nowrap">주문이 사장님께 날아갔어요!</span>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCXqCCi3tWHmL6OKC4SIkqYsJA1-0Sal4w",
      authDomain: "flower-d52f7.firebaseapp.com",
      projectId: "flower-d52f7",
      storageBucket: "flower-d52f7.firebasestorage.app",
      messagingSenderId: "894573402179",
      appId: "1:894573402179:web:645cb0aef8b4d977ffdcf6",
      measurementId: "G-F4X9T42XMP",
      databaseURL: "https://flower-d52f7-default-rtdb.firebaseio.com" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const DB_ORDERS_PATH = "kindergarten_flower_orders";

    const flowers = [
      { id: 'single_flower', name: '꽃 한 송이', icon: '🌹', color: 'bg-rose-50', border: 'border-rose-300' },
      { id: 'bouquet', name: '꽃다발', icon: '💐', color: 'bg-amber-50', border: 'border-amber-300' },
      { id: 'basket', name: '꽃바구니', icon: '🧺', color: 'bg-emerald-50', border: 'border-emerald-300' }
    ];

    let cart = { single_flower: 0, bouquet: 0, basket: 0 };
    let currentRole = null;
    let previousOrderCount = 0;
    let rtdbListener = null;
    let isInitialLoad = true; // 첫 로드 시점인지 구별하는 변수

    // --- 웹 오디오 설정 ---
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      // 태블릿 브라우저 자동재생 잠금 우회를 위해 사전에 무음 음성을 가볍게 실행시킵니다.
      if ('speechSynthesis' in window) {
        const u = new SpeechSynthesisUtterance(" ");
        u.volume = 0;
        window.speechSynthesis.speak(u);
      }
    }

    window.addEventListener('touchstart', initAudio, { passive: true });
    window.addEventListener('click', initAudio, { passive: true });
    window.addEventListener('pointerdown', initAudio, { passive: true });

    function playSound(type) {
      initAudio();
      if (!audioCtx) return;

      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      
      const now = audioCtx.currentTime;

      if (type === 'success') {
        osc.type = 'sine';
        const notes = [523.25, 659.25, 783.99, 1046.50];
        notes.forEach((freq, index) => {
          osc.frequency.setValueAtTime(freq, now + index * 0.08);
        });
        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(0.6, now + 0.05);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
        osc.start(now);
        osc.stop(now + 0.6);
      } else if (type === 'notification') {
        // 복구: 새 주문 수신 알림음 (띠로롱~)
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(880.00, now);
        osc.frequency.setValueAtTime(698.46, now + 0.12);
        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(0.7, now + 0.05);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
        osc.start(now);
        osc.stop(now + 0.8);
      } else if (type === 'pop') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(450, now);
        osc.frequency.exponentialRampToValueAtTime(1000, now + 0.06);
        gainNode.gain.setValueAtTime(0.6, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.06);
        osc.start(now);
        osc.stop(now + 0.06);
      }
    }
    // --- 앱 상태 제어 ---
    window.startApp = (role) => {
      initAudio();
      playSound('pop');
      currentRole = role;
      document.getElementById('view-menu').classList.add('hidden');

      if (role === 'customer') {
        document.getElementById('view-customer').classList.remove('hidden');
        document.getElementById('view-owner').classList.add('hidden');
        renderCustomerView();
      } else if (role === 'owner') {
        document.getElementById('view-owner').classList.remove('hidden');
        document.getElementById('view-customer').classList.add('hidden');
        isInitialLoad = true; // 사장님 화면에 들어올 때마다 초기화
        startListeningToOrders();
      }
    };

    window.goHome = () => {
      playSound('pop');
      document.getElementById('view-customer').classList.add('hidden');
      document.getElementById('view-owner').classList.add('hidden');
      document.getElementById('view-menu').classList.remove('hidden');
      if (rtdbListener) {
        rtdbListener();
        rtdbListener = null;
      }
      resetCart();
      currentRole = null;
    };

    // --- 손님용 (키오스크) 화면 설계 ---
    function renderCustomerView() {
      const grid = document.getElementById('flower-grid');
      grid.innerHTML = '';
      flowers.forEach(flower => {
        const currentCount = cart[flower.id];
        const isMax = currentCount >= 3;
        const plusBtnClass = isMax 
          ? "bg-gray-300 text-gray-500 w-12 h-12 sm:w-16 sm:h-16 rounded-xl sm:rounded-2xl text-2xl sm:text-4xl font-extrabold flex items-center justify-center cursor-not-allowed opacity-50 transition-colors"
          : "btn-press bg-pink-400 text-white w-12 h-12 sm:w-16 sm:h-16 rounded-xl sm:rounded-2xl text-2xl sm:text-4xl font-extrabold flex items-center justify-center transition-colors";

        const card = document.createElement('div');
        // 가로/세로 화면에 맞추어 유동적으로 큼직한 비율로 유지
        card.className = `${flower.color} border-4 ${flower.border} rounded-[2.5rem] p-4 sm:p-6 flex flex-row landscape:flex-col justify-around items-center shadow-lg h-full w-full min-h-0`;
        card.innerHTML = `
          <!-- 이모지 크기를 기존 대비 1.5배 확대하여 더 시원하고 또렷하게 출력 -->
          <div class="text-7xl sm:text-8xl landscape:text-[9rem] landscape:md:text-[11.5rem] leading-none select-none flex-shrink-0">${flower.icon}</div>
          <!-- 글씨 크기 확대 (text-3xl sm:text-4xl md:text-5xl) -->
          <div class="text-3xl sm:text-4xl md:text-5xl font-black text-gray-800 whitespace-nowrap">${flower.name}</div>
          <div class="flex items-center gap-3 sm:gap-6 bg-white rounded-2xl p-2.5 sm:p-3 shadow-inner w-auto sm:w-full max-w-xs justify-between flex-shrink-0">
            <button onclick="updateCart('${flower.id}', -1)" class="btn-press bg-gray-200 text-gray-700 w-12 h-12 sm:w-16 sm:h-16 rounded-xl sm:rounded-2xl text-2xl sm:text-4xl font-extrabold flex items-center justify-center">-</button>
            <span id="count-${flower.id}" class="text-2xl sm:text-4xl md:text-5xl font-extrabold w-12 sm:w-16 text-center text-gray-800">${currentCount}</span>
            <button id="btn-plus-${flower.id}" onclick="updateCart('${flower.id}', 1)" ${isMax ? 'disabled' : ''} class="${plusBtnClass}">+</button>
          </div>
        `;
        grid.appendChild(card);
      });
      updateOrderButton();
    }

    window.addEventListener('resize', () => {
      if (currentRole === 'customer') {
        renderCustomerView();
      }
    });

    window.updateCart = (flowerId, change) => {
      playSound('pop');
      const newCount = cart[flowerId] + change;
      
      // 최소 0개에서 최대 3개까지만 제한
      if (newCount >= 0 && newCount <= 3) {
        cart[flowerId] = newCount;
        document.getElementById(`count-${flowerId}`).innerText = cart[flowerId];
        
        // 플러스(+) 버튼 UI 실시간 갱신
        const plusBtn = document.getElementById(`btn-plus-${flowerId}`);
        if (newCount >= 3) {
          plusBtn.disabled = true;
          plusBtn.className = "bg-gray-300 text-gray-500 w-12 h-12 sm:w-16 sm:h-16 rounded-xl sm:rounded-2xl text-2xl sm:text-4xl font-extrabold flex items-center justify-center cursor-not-allowed opacity-50 transition-colors";
        } else {
          plusBtn.disabled = false;
          plusBtn.className = "btn-press bg-pink-400 text-white w-12 h-12 sm:w-16 sm:h-16 rounded-xl sm:rounded-2xl text-2xl sm:text-4xl font-extrabold flex items-center justify-center transition-colors";
        }
        
        updateOrderButton();
      }
    };

    function updateOrderButton() {
      const totalCount = Object.values(cart).reduce((a, b) => a + b, 0);
      document.getElementById('total-count').innerText = totalCount;
      
      const btn = document.getElementById('btn-order');
      if (totalCount > 0) {
        btn.classList.remove('opacity-50', 'cursor-not-allowed', 'bg-gray-400', 'border-gray-600');
        btn.classList.add('bg-pink-500', 'border-pink-700');
        btn.disabled = false;
      } else {
        btn.classList.add('opacity-50', 'cursor-not-allowed', 'bg-gray-400', 'border-gray-600');
        btn.classList.remove('bg-pink-500', 'border-pink-700');
        btn.disabled = true;
      }
    }

    function resetCart() {
      for (let key in cart) {
        cart[key] = 0;
      }
      renderCustomerView();
    }

    window.submitOrder = async () => {
      const totalCount = Object.values(cart).reduce((a, b) => a + b, 0);
      if (totalCount === 0) return;

      const orderItems = [];
      flowers.forEach(f => {
        if (cart[f.id] > 0) {
          orderItems.push({ name: f.name, icon: f.icon, count: cart[f.id] });
        }
      });

      resetCart();
      updateOrderButton();

      playSound('success');
      const toast = document.getElementById('toast-message');
      toast.classList.remove('hidden');
      setTimeout(() => {
        toast.classList.add('hidden');
      }, 1800);

      try {
        const dbRef = ref(db, DB_ORDERS_PATH);
        await push(dbRef, {
          items: orderItems,
          total: totalCount,
          createdAt: serverTimestamp()
        });
      } catch (error) {
        console.error("주문 전송 오류:", error);
      }
    };

    // --- 사장님용 실시간 데이터 수신 ---
    function startListeningToOrders() {
      const dbRef = ref(db, DB_ORDERS_PATH);
      
      rtdbListener = onValue(dbRef, (snapshot) => {
        const orders = [];
        const data = snapshot.val();
        
        if (data) {
          Object.keys(data).forEach((key) => {
            orders.push({ id: key, ...data[key] });
          });
          
          orders.sort((a, b) => {
            const timeA = a.createdAt ? a.createdAt : Date.now();
            const timeB = b.createdAt ? b.createdAt : Date.now();
            return timeA - timeB;
          });
        }

        renderOwnerView(orders);

        // 첫 페이지 로드(isInitialLoad)가 끝난 후 새 주문이 들어왔을 때만 소리 재생
        if (!isInitialLoad && orders.length > previousOrderCount) {
          playSound('notification');
          document.body.classList.add('flash-bg');
          setTimeout(() => document.body.classList.remove('flash-bg'), 2400);
        }
        
        previousOrderCount = orders.length;
        isInitialLoad = false; // 첫 데이터 조회가 끝났으므로 false로 변경
      }, (error) => {
        console.error("실시간 수신 오류:", error);
      });
    }

    function renderOwnerView(orders) {
      const listContainer = document.getElementById('order-list');
      const emptyState = document.getElementById('empty-orders');
      document.getElementById('order-count-badge').innerText = orders.length;

      Array.from(listContainer.children).forEach(child => {
        if (child.id !== 'empty-orders') listContainer.removeChild(child);
      });

      if (orders.length === 0) {
        emptyState.classList.remove('hidden');
      } else {
        emptyState.classList.add('hidden');
        
        orders.forEach((order, index) => {
          const card = document.createElement('div');
          card.className = "bg-white p-4 sm:p-5 rounded-[2rem] shadow-lg border-4 border-blue-200 flex flex-col md:flex-row justify-between items-center gap-4 pop-in";
          card.style.animationDelay = `${index * 0.1}s`;
          
          let itemsHtml = order.items.map(item => 
            `<div class="flex items-center gap-3 bg-pink-50 px-5 py-3 rounded-2xl text-2xl sm:text-3xl border border-pink-100 whitespace-nowrap">
               <span class="text-3xl sm:text-4xl">${item.icon}</span>
               <span class="font-bold text-gray-700">${item.name} <span class="text-pink-600 font-extrabold text-3xl sm:text-4xl">${item.count}</span>개</span>
             </div>`
          ).join('');

          card.innerHTML = `
            <div class="flex-1 w-full">
              <div class="text-blue-500 font-bold mb-2 sm:mb-3 flex items-center gap-2">
                <span class="bg-blue-100 px-3 py-1.5 rounded-xl text-lg sm:text-xl font-black whitespace-nowrap">주문 번호 ${index + 1}</span>
              </div>
              <div class="flex flex-wrap gap-2 sm:gap-3 font-bold">
                ${itemsHtml}
              </div>
            </div>
            <button onclick="completeOrder('${order.id}')" class="btn-press shrink-0 bg-blue-500 hover:bg-blue-600 text-white text-xl sm:text-2xl md:text-3xl font-bold py-4 sm:py-6 px-8 sm:px-10 rounded-[1.5rem] shadow-xl border-b-8 border-blue-700 w-full md:w-auto transition-all whitespace-nowrap">
              배달 완료 🚚
            </button>
          `;
          listContainer.appendChild(card);
        });
      }
    }

    window.completeOrder = async (orderId) => {
      playSound('pop');
      try {
        const orderRef = ref(db, `${DB_ORDERS_PATH}/${orderId}`);
        await remove(orderRef);
      } catch (error) {
        console.error("배달 처리 오류:", error);
      }
    };

  </script>
</body>
</html>
