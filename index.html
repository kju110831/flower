<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🌸 유치원 꽃가게 놀이 🌸</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Jua', sans-serif;
      background-color: #FFF5F5;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      /* 크롬 주소창 등으로 인한 화면 스크롤과 출렁임 원천 차단 */
      overflow: hidden; 
    }
    .btn-press:active {
      transform: scale(0.95);
    }
    .flash-bg {
      animation: flash 0.8s ease-in-out 3;
    }
    @keyframes flash {
      0%, 100% { background-color: #FFF5F5; }
      50% { background-color: #FEF08A; }
    }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="text-gray-800 h-[100dvh] w-screen overflow-hidden bg-[#FFF5F5] p-0 m-0 flex justify-center items-center">

  <!-- 전체 화면 컨테이너 (h-[100dvh]를 사용하여 주소창과 네비바를 제외한 실제 화면에 100% 밀착시킴) -->
  <div id="app-container" class="w-full h-[100dvh] relative overflow-hidden flex flex-col p-0 m-0">
    
    <!-- 1. 시작 메뉴 화면 -->
    <div id="view-menu" class="absolute inset-0 flex flex-col items-center justify-center bg-[#FFF0F5] z-50 p-6">
      <h1 class="text-5xl sm:text-7xl md:text-8xl text-pink-500 mb-6 text-center drop-shadow-md font-black">🌸 유치원 꽃가게 🌸</h1>
      <p class="text-xl sm:text-2xl md:text-3xl text-pink-400 mb-10 sm:mb-14 font-bold">역할을 골라주세요!</p>
      <div class="flex flex-col sm:flex-row gap-6 sm:gap-10 w-full max-w-4xl justify-center px-6">
        <button onclick="startApp('customer')" class="btn-press flex-1 bg-pink-400 hover:bg-pink-500 text-white text-3xl sm:text-4xl md:text-5xl py-10 sm:py-16 px-8 rounded-[2.5rem] shadow-2xl border-b-8 border-pink-600 flex flex-col items-center justify-center gap-4 sm:gap-6 transition-all">
          <span class="text-7xl sm:text-8xl md:text-9xl">👧👦</span>
          <span class="font-bold tracking-wide">손님용 키오스크</span>
        </button>
        <button onclick="startApp('owner')" class="btn-press flex-1 bg-blue-400 hover:bg-blue-500 text-white text-3xl sm:text-4xl md:text-5xl py-10 sm:py-16 px-8 rounded-[2.5rem] shadow-2xl border-b-8 border-blue-600 flex flex-col items-center justify-center gap-4 sm:gap-6 transition-all">
          <span class="text-7xl sm:text-8xl md:text-9xl">🏪</span>
          <span class="font-bold tracking-wide">사장님용 화면</span>
        </button>
      </div>
    </div>

    <!-- 2. 손님용 화면 -->
    <div id="view-customer" class="hidden absolute inset-0 flex flex-col bg-pink-50 z-40 h-[100dvh]">
      <!-- 상단 헤더 -->
      <div class="bg-pink-400 text-white text-2xl sm:text-4xl md:text-5xl font-bold py-3 sm:py-5 px-6 sm:px-8 text-center shadow-md flex justify-between items-center shrink-0">
        <button onclick="goHome()" class="text-lg sm:text-2xl md:text-3xl bg-pink-500 py-2 sm:py-3 px-4 sm:px-6 rounded-2xl btn-press">🏠 처음으로</button>
        <span class="tracking-wide">🌸 예쁜 꽃을 골라주세요 🌸</span>
        <div class="w-24 sm:w-32"></div>
      </div>
      
      <!-- 꽃 상품 리스트 (가로/세로 자동 대처, 패딩을 줄여 안전성 확보) -->
      <div id="flower-grid" class="flex-1 p-3 sm:p-5 grid grid-cols-1 landscape:grid-cols-3 gap-3 sm:gap-5 h-full min-h-0 overflow-hidden">
        <!-- JS 렌더링 영역 -->
      </div>

      <!-- 하단 주문바 (크롬 주소창과 시스템 네비게이션바를 배려한 적정 여백 적용) -->
      <div class="bg-white py-3 sm:py-5 px-6 sm:px-12 shadow-[0_-6px_20px_rgba(0,0,0,0.15)] shrink-0 flex justify-between items-center rounded-t-[1.5rem] sm:rounded-t-[2.5rem] border-t-4 sm:border-t-8 border-pink-200 font-bold mb-0 pb-safe">
        <div class="text-xl sm:text-3xl md:text-4xl text-pink-600">
          내가 고른 수량: <span id="total-count" class="text-2xl sm:text-4xl md:text-5xl text-pink-500 font-extrabold">0</span> 개
        </div>
        <button id="btn-order" onclick="submitOrder()" class="btn-press bg-pink-500 text-white text-xl sm:text-3xl md:text-4xl font-bold py-3 sm:py-5 px-6 sm:px-12 rounded-xl sm:rounded-2xl shadow-xl border-b-4 sm:border-b-8 border-pink-700 opacity-50 cursor-not-allowed transition-all flex items-center gap-3">
          <span>주문하기</span> <span>🛒</span>
        </button>
      </div>
    </div>

    <!-- 3. 사장님용 화면 -->
    <div id="view-owner" class="hidden absolute inset-0 flex flex-col bg-blue-50 z-30 h-[100dvh]">
      <!-- 상단 헤더 -->
      <div class="bg-blue-400 text-white text-2xl sm:text-4xl md:text-5xl font-bold py-3 sm:py-5 px-6 sm:px-8 text-center shadow-md flex justify-between items-center shrink-0">
        <button onclick="goHome()" class="text-lg sm:text-2xl md:text-3xl bg-blue-500 py-2 sm:py-3 px-4 sm:px-6 rounded-2xl btn-press">🏠 처음으로</button>
        <span class="tracking-wide font-bold">🏪 꽃가게 사장님 화면 🏪</span>
        <div class="text-xl sm:text-2xl bg-blue-500 py-2 sm:py-3 px-4 sm:px-6 rounded-2xl font-bold">대기 주문: <span id="order-count-badge">0</span></div>
      </div>

      <!-- 주문 내역 리스트 -->
      <div id="order-list" class="flex-1 overflow-y-auto p-4 sm:p-6 flex flex-col gap-4 sm:gap-5">
        <div id="empty-orders" class="h-full flex flex-col items-center justify-center text-gray-400 text-3xl sm:text-4xl gap-4 sm:gap-6 my-auto font-bold">
          <span class="text-7xl sm:text-8xl">💤</span>
          <span class="text-gray-500 text-2xl sm:text-3xl">아직 들어온 주문이 없어요!</span>
          <span class="text-lg sm:text-xl text-gray-400">손님들이 주문을 준비하고 있어요.</span>
        </div>
      </div>
    </div>

    <!-- 주문 성공 즉시 알림 토스트 -->
    <div id="toast-message" class="hidden absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-green-500 text-white px-10 sm:px-16 py-6 sm:py-8 rounded-[2rem] text-3xl sm:text-4xl md:text-5xl shadow-2xl z-[100] font-bold pointer-events-none transition-all duration-300 flex flex-col items-center gap-3 sm:gap-4">
      <span class="text-6xl sm:text-7xl">🎉</span>
      <span class="text-center">주문이 사장님께 날아갔어요!</span>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

    // 선생님의 Firebase 설정 정보
    const firebaseConfig = {
      apiKey: "AIzaSyCXqCCi3tWHmL6OKC4SIkqYsJA1-0Sal4w",
      authDomain: "flower-d52f7.firebaseapp.com",
      projectId: "flower-d52f7",
      storageBucket: "flower-d52f7.firebasestorage.app",
      messagingSenderId: "894573402179",
      appId: "1:894573402179:web:645cb0aef8b4d977ffdcf6",
      measurementId: "G-F4X9T42XMP",
      databaseURL: "https://flower-d52f7-default-rtdb.firebaseio.com" 
    };

    // Firebase 초기화
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const DB_ORDERS_PATH = "kindergarten_flower_orders";

    const flowers = [
      { id: 'single_flower', name: '꽃 한 송이', icon: '🌹', color: 'bg-rose-50', border: 'border-rose-300' },
      { id: 'bouquet', name: '꽃다발', icon: '💐', color: 'bg-amber-50', border: 'border-amber-300' },
      { id: 'basket', name: '꽃바구니', icon: '🧺', color: 'bg-emerald-50', border: 'border-emerald-300' }
    ];

    let cart = { single_flower: 0, bouquet: 0, basket: 0 };
    let currentRole = null;
    let previousOrderCount = 0;
    let rtdbListener = null;

    // --- 웹 오디오 설정 ---
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    // 터치 입력 즉시 음소거 해제
    window.addEventListener('touchstart', initAudio, { passive: true });
    window.addEventListener('click', initAudio, { passive: true });
    window.addEventListener('pointerdown', initAudio, { passive: true });

    function playSound(type) {
      initAudio();
      if (!audioCtx) return;

      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      
      const now = audioCtx.currentTime;

      if (type === 'success') {
        osc.type = 'sine';
        const notes = [523.25, 659.25, 783.99, 1046.50];
        notes.forEach((freq, index) => {
          osc.frequency.setValueAtTime(freq, now + index * 0.08);
        });
        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(0.6, now + 0.05);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
        osc.start(now);
        osc.stop(now + 0.6);
      } else if (type === 'notification') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(880.00, now);
        osc.frequency.setValueAtTime(698.46, now + 0.12);
        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(0.7, now + 0.05);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
        osc.start(now);
        osc.stop(now + 0.8);
      } else if (type === 'pop') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(450, now);
        osc.frequency.exponentialRampToValueAtTime(1000, now + 0.06);
        gainNode.gain.setValueAtTime(0.6, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.06);
        osc.start(now);
        osc.stop(now + 0.06);
      }
    }

    // --- 앱 상태 제어 ---
    window.startApp = (role) => {
      initAudio();
      playSound('pop');
      currentRole = role;
      document.getElementById('view-menu').classList.add('hidden');

      if (role === 'customer') {
        document.getElementById('view-customer').classList.remove('hidden');
        document.getElementById('view-owner').classList.add('hidden');
        renderCustomerView();
      } else if (role === 'owner') {
        document.getElementById('view-owner').classList.remove('hidden');
        document.getElementById('view-customer').classList.add('hidden');
        startListeningToOrders();
      }
    };

    window.goHome = () => {
      playSound('pop');
      document.getElementById('view-customer').classList.add('hidden');
      document.getElementById('view-owner').classList.add('hidden');
      document.getElementById('view-menu').classList.remove('hidden');
      if (rtdbListener) {
        rtdbListener();
        rtdbListener = null;
      }
      resetCart();
      currentRole = null;
    };

    // --- 손님용 (키오스크) 화면 설계 ---
    function renderCustomerView() {
      const grid = document.getElementById('flower-grid');
      grid.innerHTML = '';
      flowers.forEach(flower => {
        const card = document.createElement('div');
        // 크롬 브라우저에서 상단 탭 때문에 세로가 눌릴 것을 대비해 p-3 등 카드 내부 여백을 컴팩트하게 조정
        card.className = `${flower.color} border-4 ${flower.border} rounded-[2rem] p-3 sm:p-4 flex flex-row landscape:flex-col justify-between items-center shadow-md h-full w-full min-h-0`;
        card.innerHTML = `
          <div class="text-6xl sm:text-7xl landscape:text-[7.5rem] landscape:md:text-[8.5rem] leading-none select-none flex-shrink-0">${flower.icon}</div>
          <div class="text-2xl sm:text-3xl md:text-4xl font-black text-gray-800">${flower.name}</div>
          <div class="flex items-center gap-2 sm:gap-4 bg-white rounded-2xl p-2 shadow-inner w-auto sm:w-full max-w-xs justify-between flex-shrink-0">
            <button onclick="updateCart('${flower.id}', -1)" class="btn-press bg-gray-200 text-gray-700 w-11 h-11 sm:w-14 sm:h-14 rounded-xl sm:rounded-2xl text-xl sm:text-3xl font-extrabold flex items-center justify-center">-</button>
            <span id="count-${flower.id}" class="text-xl sm:text-3xl md:text-4xl font-extrabold w-10 sm:w-14 text-center text-gray-800">0</span>
            <button onclick="updateCart('${flower.id}', 1)" class="btn-press bg-pink-400 text-white w-11 h-11 sm:w-14 sm:h-14 rounded-xl sm:rounded-2xl text-xl sm:text-3xl font-extrabold flex items-center justify-center">+</button>
          </div>
        `;
        grid.appendChild(card);
      });
      updateOrderButton();
    }

    // 회전 센서나 창 크기 바뀔 때 화면을 예쁘게 자동 재정렬
    window.addEventListener('resize', () => {
      if (currentRole === 'customer') {
        renderCustomerView();
      }
    });

    window.updateCart = (flowerId, change) => {
      playSound('pop');
      const newCount = cart[flowerId] + change;
      if (newCount >= 0 && newCount <= 20) {
        cart[flowerId] = newCount;
        document.getElementById(`count-${flowerId}`).innerText = cart[flowerId];
        updateOrderButton();
      }
    };

    function updateOrderButton() {
      const totalCount = Object.values(cart).reduce((a, b) => a + b, 0);
      document.getElementById('total-count').innerText = totalCount;
      
      const btn = document.getElementById('btn-order');
      if (totalCount > 0) {
        btn.classList.remove('opacity-50', 'cursor-not-allowed', 'bg-gray-400', 'border-gray-600');
        btn.classList.add('bg-pink-500', 'border-pink-700');
        btn.disabled = false;
      } else {
        btn.classList.add('opacity-50', 'cursor-not-allowed', 'bg-gray-400', 'border-gray-600');
        btn.classList.remove('bg-pink-500', 'border-pink-700');
        btn.disabled = true;
      }
    }

    function resetCart() {
      for (let key in cart) {
        cart[key] = 0;
      }
      renderCustomerView();
    }

    window.submitOrder = async () => {
      const totalCount = Object.values(cart).reduce((a, b) => a + b, 0);
      if (totalCount === 0) return;

      const orderItems = [];
      flowers.forEach(f => {
        if (cart[f.id] > 0) {
          orderItems.push({ name: f.name, icon: f.icon, count: cart[f.id] });
        }
      });

      // 누르자마자 딜레이 없이 수량 즉시 0으로 완전히 대기 리셋
      resetCart();
      updateOrderButton();

      // 소리와 배송 완료 알림 팝업 즉시 실행
      playSound('success');
      const toast = document.getElementById('toast-message');
      toast.classList.remove('hidden');
      setTimeout(() => {
        toast.classList.add('hidden');
      }, 1800);

      // Realtime Database로 주문 푸시 전송
      try {
        const dbRef = ref(db, DB_ORDERS_PATH);
        await push(dbRef, {
          items: orderItems,
          total: totalCount,
          createdAt: serverTimestamp()
        });
      } catch (error) {
        console.error("주문 전송 오류:", error);
      }
    };

    // --- 사장님용 실시간 데이터 수신 ---
    function startListeningToOrders() {
      const dbRef = ref(db, DB_ORDERS_PATH);
      
      rtdbListener = onValue(dbRef, (snapshot) => {
        const orders = [];
        const data = snapshot.val();
        
        if (data) {
          Object.keys(data).forEach((key) => {
            orders.push({ id: key, ...data[key] });
          });
          
          orders.sort((a, b) => {
            const timeA = a.createdAt ? a.createdAt : Date.now();
            const timeB = b.createdAt ? b.createdAt : Date.now();
            return timeA - timeB;
          });
        }

        renderOwnerView(orders);

        if (orders.length > previousOrderCount) {
          if (previousOrderCount !== 0) {
            playSound('notification');
            document.body.classList.add('flash-bg');
            setTimeout(() => document.body.classList.remove('flash-bg'), 2400);
          }
        }
        previousOrderCount = orders.length;
      }, (error) => {
        console.error("실시간 수신 오류:", error);
      });
    }

    function renderOwnerView(orders) {
      const listContainer = document.getElementById('order-list');
      const emptyState = document.getElementById('empty-orders');
      document.getElementById('order-count-badge').innerText = orders.length;

      Array.from(listContainer.children).forEach(child => {
        if (child.id !== 'empty-orders') listContainer.removeChild(child);
      });

      if (orders.length === 0) {
        emptyState.classList.remove('hidden');
      } else {
        emptyState.classList.add('hidden');
        
        orders.forEach((order, index) => {
          const card = document.createElement('div');
          card.className = "bg-white p-4 sm:p-5 rounded-[2rem] shadow-lg border-4 border-blue-200 flex flex-col md:flex-row justify-between items-center gap-4 pop-in";
          card.style.animationDelay = `${index * 0.1}s`;
          
          let itemsHtml = order.items.map(item => 
            `<div class="flex items-center gap-3 bg-pink-50 px-4 py-2 rounded-2xl text-xl sm:text-2xl border border-pink-100">
               <span class="text-2xl sm:text-3xl">${item.icon}</span>
               <span class="font-bold text-gray-700">${item.name} <span class="text-pink-600 font-extrabold text-2xl sm:text-3xl">${item.count}</span>개</span>
             </div>`
          ).join('');

          card.innerHTML = `
            <div class="flex-1 w-full">
              <div class="text-blue-500 font-bold mb-2 sm:mb-3 flex items-center gap-2">
                <span class="bg-blue-100 px-3 py-1.5 rounded-xl text-lg sm:text-xl font-black">주문 번호 ${index + 1}</span>
              </div>
              <div class="flex flex-wrap gap-2 sm:gap-3 font-bold">
                ${itemsHtml}
              </div>
            </div>
            <button onclick="completeOrder('${order.id}')" class="btn-press shrink-0 bg-blue-500 hover:bg-blue-600 text-white text-xl sm:text-2xl md:text-3xl font-bold py-4 sm:py-6 px-8 sm:px-10 rounded-[1.5rem] shadow-xl border-b-8 border-blue-700 w-full md:w-auto transition-all">
              배달 완료 🚚
            </button>
          `;
          listContainer.appendChild(card);
        });
      }
    }

    window.completeOrder = async (orderId) => {
      playSound('pop');
      try {
        const orderRef = ref(db, `${DB_ORDERS_PATH}/${orderId}`);
        await remove(orderRef);
      } catch (error) {
        console.error("배달 처리 오류:", error);
      }
    };

  </script>
</body>
</html>
